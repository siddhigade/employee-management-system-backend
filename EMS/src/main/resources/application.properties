spring.application.name=EMS
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/ems_data
spring.datasource.username=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.config.import=optional:application-secrets.properties
spring.security.filter.order=10
logging.level.org.springframework.security=DEBUG
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=never
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.3
